# ================= STUDENTS =================
sql.student.get_by_id=SELECT * FROM students WHERE student_id = ?
sql.student.get_all=SELECT * FROM students

# ================= COURSES =================
sql.course.get_by_id=SELECT * FROM courses WHERE course_id = ?
sql.course.find_by_teacher=SELECT * FROM courses WHERE teacher_id = ?

# ================= FINAL_WORKS =================
sql.function.add_final_work={ ? = call add_final_work(?, ?, ?, ?, ?, ?) }
sql.final_work.update=UPDATE final_works SET course_id=?, student_id=?, exam_date=?, ticket_number=?, theory_grade=?, practice_grade=?, is_active=? WHERE final_id=?
sql.final_work.find_by_student=SELECT * FROM final_works WHERE student_id = ? AND is_active = true
sql.final_work.soft_delete=UPDATE final_works SET is_active = false WHERE final_id = ?

# ================= INDIVIDUAL_ASSIGNMENTS =================
sql.assignment.add=INSERT INTO individual_assignments (topic_id, student_id, assignment_name, assignment_date, grade, status, submission_date, is_active) VALUES (?, ?, ?, ?, ?, ?, ?, ?)
sql.assignment.update=UPDATE individual_assignments SET topic_id=?, student_id=?, assignment_name=?, assignment_date=?, grade=?, status=?, submission_date=?, is_active=? WHERE assignment_id=?
sql.assignment.soft_delete=UPDATE individual_assignments SET is_active = false WHERE assignment_id = ?
sql.assignment.find_by_student=SELECT * FROM individual_assignments WHERE student_id = ? AND is_active = true

# ================= ATTENDANCE =================
sql.procedure.save_attendance={ call save_attendance_record(?, ?, ?) }
sql.attendance.update=UPDATE attendance SET lesson_id=?, student_id=?, is_present=?, comment=? WHERE attendance_id=?
sql.attendance.find_by_lesson=SELECT * FROM attendance WHERE lesson_id = ?
sql.attendance.find_by_student=SELECT * FROM attendance WHERE student_id = ?

# ================= GROUPS =================
sql.group.get_by_id=SELECT * FROM groups WHERE group_id = ?
sql.group.find_by_course=SELECT * FROM groups WHERE course_id = ?

# ================= LESSONS =================
sql.function.add_lesson={ ? = call add_lesson(?, ?, ?, ?) }
sql.lesson.find_by_topic=SELECT * FROM lessons WHERE topic_id = ?

# ================= TOPICS =================
sql.topic.find_by_course=SELECT * FROM topics WHERE course_id = ?

# ================= TEACHERS =================
sql.teacher.authenticate=SELECT * FROM teachers WHERE username = ? AND password_hash = ?
sql.teacher.update=UPDATE teachers SET last_name=?, first_name=?, middle_name=?, email=?, subject_id=?, photo=? WHERE teacher_id=?

# ================= STUDENTS_GROUPS =================
sql.students_group.get_ids_by_group=SELECT student_id FROM students_groups WHERE group_id = ?